name: netdrift

# Three FRR routers on a couple of point-to-point links. Each maps its SSH
# port to localhost so netmiko can reach them the same way the inventory expects.
topology:
  nodes:
    r1:
      kind: linux
      image: frrouting/frr:latest
      ports: ["2211:22"]
    r2:
      kind: linux
      image: frrouting/frr:latest
      ports: ["2212:22"]
    r3:
      kind: linux
      image: frrouting/frr:latest
      ports: ["2213:22"]
  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r1:eth2", "r3:eth1"]
